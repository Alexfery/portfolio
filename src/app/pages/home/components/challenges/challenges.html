<section class="challenges" id="challenges">
  <h2 class="section-title">{{ langService.t().challenges.title }}</h2>
  <p class="section-sub">{{ langService.t().challenges.sub }}</p>

  <div class="challenges-grid">
    @for (item of langService.t().challenges.items; track item.title) {
      <article class="challenge-card">
        <div class="card-header">
          <h3>{{ item.title }}</h3>
          <span class="card-tag card-tag--active">{{ item.date }}</span>
        </div>
        <p class="challenge-role">{{ item.role }}</p>
        <p>{{ item.desc }}</p>
        <div class="challenge-tech">
          <span>{{ item.tech }}</span>
        </div>
      </article>
    }
  </div>
</section>
