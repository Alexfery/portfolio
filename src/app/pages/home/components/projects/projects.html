<section class="projects" id="projects">
  <h2 class="section-title">{{ langService.t().projects.title }}</h2>
  <p class="section-sub">{{ langService.t().projects.sub }}</p>

  <div class="projects-grid">
    @for (item of langService.t().projects.items; track item.title) {
      <article class="project-card">
        <div class="card-header">
          <h3>{{ item.title }}</h3>
          <span class="card-tag">{{ item.tag }}</span>
        </div>
        <p>{{ item.desc }}</p>
        <div class="card-links">
          <a [href]="item.link" target="_blank">GitHub</a>
        </div>
      </article>
    }
  </div>
</section>
