<section class="section" id="skills">
  <h2 class="section-title"><span class="prefix">~/</span>{{ langService.t().skills.title }}</h2>

  <div class="grid">
    @for (group of langService.t().skills.groups; track group.label) {
      <div class="card group">
        <p class="label">{{ group.label }}</p>
        <div class="chips">
          @for (chip of group.items; track chip) {
            <span class="chip">{{ chip }}</span>
          }
        </div>
      </div>
    }
  </div>
</section>
