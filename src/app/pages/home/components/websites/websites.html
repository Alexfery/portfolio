<section class="section" id="websites">
  <h2 class="section-title"><span class="prefix">~/</span>{{ langService.t().websites.title }}</h2>

  <div class="grid">
    @for (item of langService.t().websites.items; track item.title) {
      <article class="card site-card">
        <div class="meta">
          <span class="badge">{{ item.badge }}</span>
          <span class="tech">{{ item.tech }}</span>
        </div>
        <h3>{{ item.title }}</h3>
        <p>{{ item.desc }}</p>
        <a class="link" [href]="item.link" target="_blank">{{ item.linkLabel }}</a>
      </article>
    }
  </div>
</section>
