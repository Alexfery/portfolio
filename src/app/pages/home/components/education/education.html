<section class="section" id="education">
  <h2 class="section-title"><span class="prefix">~/</span>{{ langService.t().education.title }}</h2>

  <div class="timeline">
    @for (item of langService.t().education.items; track item.title) {
      <div class="row">
        <span class="period">{{ item.period }}</span>
        <div>
          <h3>{{ item.title }}</h3>
          <p>{{ item.place }} · <a [href]="item.url" target="_blank">{{ item.urlLabel }}</a></p>
        </div>
      </div>
    }
  </div>
</section>
